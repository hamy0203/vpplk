.btn{padding:12px 20px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}

.progress{display:flex;justify-content:center;gap:6px;padding:10px 0;font-size:12px;font-weight:600;position:sticky;top:48px;z-index:99;background:var(--bg)}
.p-step{padding:6px 10px;border-radius:20px;border:1px solid var(--divider);background:var(--cardBg);color:var(--muted);cursor:pointer}
.p-step.active{background:var(--accent);color:var(--accentText);border-color:var(--accent)}

.toggle{width:44px;height:24px;border-radius:12px;background:var(--toggleBg);position:relative;cursor:pointer;border:none;padding:0;transition:background 0.2s;display:inline-block;vertical-align:middle}
.toggle.on{background:var(--toggleActive)}.toggle-knob{width:20px;height:20px;border-radius:10px;background:#fff;position:absolute;top:2px;left:2px;transition:left 0.2s}.toggle.on .toggle-knob{left:22px}

.row{display:flex;gap:8px}.flex1{flex:1}
.chip{display:inline-flex;align-items:center;gap:4px;background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);border-radius:12px;padding:2px 10px;font-size:12px;margin:2px 4px 2px 0}
.chip-x{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;padding:0;line-height:1}
.collapse-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.danger-link{background:none;border:none;color:var(--danger);font-size:13px;margin-top:8px;cursor:pointer}
.empty-state{text-align:center;padding:40px;color:var(--muted)}

.auto-calc{font-size:13px;color:var(--muted);padding:4px 0}

    bd.appendChild(el("button",{className:"btn btn-o",style:{marginTop:"4px"},onClick:function(){cp.mauCaBiet.push({id:gid(),boPhan:"",xi_nghiep:"",nong_truong:"",lo:"",thua:"",kinhDo:"",viDo:"",doSau:"",khoiLuong:"",baoQuan:"",datTuoi:false,nguoiLayMau:"",ngayLayMau:new Date().toISOString().slice(0,10),gioHoanThanh:"",ghiChu:""});render();save()}},T("themMauCB")));
    var nav3=el("div",{style:{display:"flex",gap:"8px",marginTop:"12px"}});nav3.appendChild(el("button",{className:"btn btn-o",style:{flex:"1"},onClick:function(){goStep(2)}},T("quayLai")));nav3.appendChild(el("button",{className:"btn btn-p",style:{flex:"1"},onClick:saveHome},T("luuPhieu")));bd.appendChild(nav3);
  }
  root.appendChild(bd);return root}

// ===== VIEW =====
function rView(){if(!S.cp)return el("div");var cp=S.cp;var root=el("div");
  var homeBtn=el("button",{className:"header-btn",onClick:function(){S.screen="home";S.cp=null;render()}});homeBtn.appendChild(icon("home"));
  var editBtn=el("button",{className:"header-btn",onClick:function(){S.ro=false;S.step=S._lastStep||1;S.screen="edit";render()}});editBtn.appendChild(icon("edit"));editBtn.appendChild(document.createTextNode(" "+T("sua")));
  root.appendChild(mkHeader(homeBtn,cp.soPhieu,[editBtn]));
  var bd=el("div",{className:"body-content"});
  var c1=el("div",{className:"card"});c1.appendChild(el("div",{style:{fontWeight:"700",marginBottom:"8px"}},T("thongTinPhieu")));
  [[T("soKHLM"),cp.soKHLM],[T("soPhieu"),cp.soPhieu],[T("soKTV"),cp.soKTV],[T("ngayLap"),cp.ngayLap],[T("khuLienHop"),cp.khuLienHop]].forEach(function(x){c1.appendChild(ro(x[0],x[1]))});bd.appendChild(c1);
  bd.appendChild(el("div",{style:{fontWeight:"700",marginTop:"12px",marginBottom:"6px"}},T("thua")+" ("+cp.vuonThua.length+")"));
  cp.vuonThua.forEach(function(v){var c=el("div",{className:"card"});c.appendChild(ro(T("thua"),thuaNameFull(v)));c.appendChild(ro(T("soLuongMau"),v.so_mau));bd.appendChild(c)});
  bd.appendChild(el("div",{style:{fontWeight:"700",marginTop:"12px",marginBottom:"6px"}},T("nhanSu")+" ("+cp.nhanSu.length+")"));
  cp.nhanSu.forEach(function(n){var c=el("div",{className:"card"});c.appendChild(ro(T("hoTen"),n.hoTen));c.appendChild(ro(T("chucDanh"),n.chucDanh));c.appendChild(ro(T("thuaPhuTrach"),Array.isArray(n.vuonPhuTrach)?n.vuonPhuTrach.join(", "):n.vuonPhuTrach));bd.appendChild(c)});
  bd.appendChild(el("div",{style:{fontWeight:"700",marginTop:"12px",marginBottom:"6px"}},T("mauTheoKH")+" ("+cp.mau.length+")"));
  cp.mau.forEach(function(m){var v=cp.vuonThua.find(function(x){return x.id===m.vuon_id});var vName=v?thuaName(v):"—";var sameV=cp.mau.filter(function(x){return x.vuon_id===m.vuon_id});var idx=sameV.indexOf(m);var suffix="-"+pad(typeof m._gi==="number"?m._gi+1:(idx>=0?idx+1:1));var c=el("div",{className:"card"});c.appendChild(ro(T("thua"),vName+suffix));c.appendChild(ro("GPS",m.kinhDo+", "+m.viDo));c.appendChild(ro(T("doSau")+" / "+T("khoiLuong"),m.doSau+" cm / "+m.khoiLuong+" kg"));c.appendChild(ro(T("baoQuan"),m.baoQuan));bd.appendChild(c)});
  var tKL=cp.mau.reduce(function(a,m){return a+(parseFloat(m.khoiLuong)||0)},0);
  bd.appendChild(el("div",{className:"card",style:{marginTop:"8px"}},[el("div",{style:{fontSize:"14px"}},[el("span",{},T("tongKLMauKH")),el("strong",{},tKL.toFixed(2)+" kg")])]));
  if(cp.mauCaBiet.length>0){
    bd.appendChild(el("div",{style:{fontWeight:"700",marginTop:"12px",marginBottom:"6px"}},T("mauCaBiet")+" ("+cp.mauCaBiet.length+")"));
    cp.mauCaBiet.forEach(function(m,i){var c=el("div",{className:"card"});var name=m.nong_truong||m.lo||m.thua?(m.nong_truong||"")+"/"+(m.lo||"")+"/"+(m.thua||""):"";var cbName=name?(m.boPhan?m.boPhan+"-":"")+name+"-CB"+pad(i+1):"—";c.appendChild(ro(T("thua"),cbName));c.appendChild(ro("GPS",m.kinhDo+", "+m.viDo));c.appendChild(ro(T("doSau")+" / "+T("khoiLuong"),m.doSau+" cm / "+m.khoiLuong+" kg"));c.appendChild(ro(T("baoQuan"),m.baoQuan));bd.appendChild(c)});
    var tKLCB=cp.mauCaBiet.reduce(function(a,m){return a+(parseFloat(m.khoiLuong)||0)},0);
    bd.appendChild(el("div",{className:"card",style:{marginTop:"8px"}},[el("div",{style:{fontSize:"14px"}},[el("span",{},T("tongKLMauCB")),el("strong",{},tKLCB.toFixed(2)+" kg")])]));
  }
  var nav=el("div",{style:{display:"flex",gap:"8px",marginTop:"16px"}});
  nav.appendChild(el("button",{className:"btn btn-p",style:{flex:"1"},onClick:function(){exportWord(cp)}},T("xuatBM")));
  bd.appendChild(nav);root.appendChild(bd);return root}

function render(){document.body.setAttribute("data-theme",S.theme);var app=document.getElementById("app");app.innerHTML="";if(S.screen==="home")app.appendChild(rHome());else if(S.screen==="create")app.appendChild(rCreate());else if(S.screen==="edit")app.appendChild(rEdit());else if(S.screen==="view")app.appendChild(rView())}
function scrollToPinned(){if(!S.pinnedId)return;var t=document.getElementById("mau-"+S.pinnedId);if(!t)return;var hdr=document.querySelector(".header"),prog=document.querySelector(".progress");var offset=(hdr?hdr.offsetHeight:0)+(prog?prog.offsetHeight:0)+8;window.scrollTo({top:t.getBoundingClientRect().top+window.scrollY-offset,behavior:"smooth"})}
load();render();
document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible")scrollToPinned()});
if('serviceWorker' in navigator){navigator.serviceWorker.register('./serviceWorker.js')}
</script>
